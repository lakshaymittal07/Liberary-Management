<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Library Management System</h1>

  <!-- Seat Booking -->
  <section>
    <h2>Seat Booking</h2>
    <p>Click on a seat to book or release it.</p>
    <div id="seatContainer"></div>
    <p id="seatInfo"></p>
  </section>

  <!-- Book Issue -->
  <section>
    <h2>Book Issue</h2>
    <form id="bookForm">
      <input type="text" id="bookTitle" placeholder="Book Title" required>
      <input type="text" id="studentName" placeholder="Student Name" required>
      <input type="text" id="studentId" placeholder="Student ID" required>
      <input type="text" id="bookId" placeholder="Book ID" required>

      <select id="department" required>
        <option value="" disabled selected>Select Department</option>
        <option value="engineering">Engineering</option>
        <option value="business">Business</option>
        <option value="pharmacy">Pharmacy</option>
        <option value="law">Law</option>
        <option value="fashion">Fashion Designing</option>
      </select>
      <button type="submit">Issue Book</button>
    </form>

    <div id="deptBookList"></div>
    <ul id="issuedBooks"></ul>
  </section>

  <!-- Library Timings -->
  <section>
    <h2>Library Timings</h2>
    <input type="text" id="dayInput" placeholder="Enter Day (e.g. Monday)">
    <button onclick="showTimings()">Check Timings</button>
    <p id="timings"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
