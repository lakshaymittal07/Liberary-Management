<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Library Management System</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>
  <h1>Library Management System</h1>

  <!-- Seat Booking -->
  <section>
    <h2>Seat Booking</h2>
    <p>Click on a seat to book or release it.</p>
    <div id="seatContainer"></div>
    <p id="seatInfo"></p>
  </section>

  <!-- Book Issue -->
  <section>
    <h2>Book Issue</h2>
    <form id="bookForm">
      <input type="text" id="bookTitle" placeholder="Book Title" required>
      <input type="text" id="studentName" placeholder="Student Name" required>
      <input type="text" id="studentId" placeholder="Student ID" required>
            <input type="text" id="booktId" placeholder="Book ID" required>

      <select id="Department" required>
    <option value="" disabled selected>Select Department</option>
    <option value="Engineering">Engineering</option>
    <option value="Business">Business</option>
    <option value="Pharmacy">Pharmacy</option>
    <option value="Law">Law</option>
    <option value="Computer Science">Computer Science</option>
    <option value="Information Technology">Information Technology</option>
    <option value="Management">Management</option>
    <option value="Commerce">Commerce</option>
    <option value="Arts">Arts</option>
    <option value="Science">Science</option>
    <option value="Medical">Medical</option>
    <option value="Nursing">Nursing</option>
    <option value="Education">Education</option>
    <option value="Architecture">Architecture</option>
    <option value="Agriculture">Agriculture</option>
    <option value="Design">Design</option>
</select>
      <button type="submit">Issue Book</button>
    </form>
    <ul id="issuedBooks"></ul>
  </section>

  <!-- Library Timings -->
  <section>
    <h2>Library Timings</h2>
    <input type="text" id="dayInput" placeholder="Enter Day (e.g. Monday)">
    <button onclick="showTimings()">Check Timings</button>
    <p id="timings"></p>
  </section>

  <script src="script.js"></script>
</body>
</html>
